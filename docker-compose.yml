# =============================================================
# docker-compose.yml — Phase 1: Local Development
# =============================================================
# Usage:
#   docker compose up -d                        # Start services in the background
#   docker compose exec app php artisan migrate  # Run database migrations inside the app container
# =============================================================

services:

  # ----------------------------------------------------------
  # Nginx — Web server / reverse proxy
  # ----------------------------------------------------------
  # Nginx — Handles HTTP requests and serves static assets
  nginx:
    # image: The pre-built software to use (e.g., Nginx version 1.27 on a lightweight "alpine" Linux)
    image: nginx:1.27-alpine
    # container_name: Assigns a friendly name so you can easily identify it in 'docker ps'
    container_name: todo_nginx
    # ports: "HostPort:ContainerPort" — Maps your computer's port 80 to the container's port 80
    ports:
      - "80:80"
    volumes:
      # :ro means "read-only" — the container can read the config but cannot change it
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/public:/var/www/html/public:ro
    # depends_on: Ensures this service starts only after the 'app' service is ready
    depends_on:
      app:
        # condition: service_healthy tells Docker to wait for the app's healthcheck to pass
        condition: service_healthy
    networks:
      - todo_network
    restart: always

  # ----------------------------------------------------------
  # PHP-FPM — Application
  # ----------------------------------------------------------
  # PHP-FPM — The core application processing Laravel code
  app:
    # build: Instructions for creating a custom Docker image
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    container_name: todo_app
    # environment: Settings passed into the application (like a .env file)
    environment:
      APP_NAME: "Todo Swarm"
      # ${VAR:-default} means: use the VAR from your system, or "todo_db" if it's missing
      DB_DATABASE: ${DB_DATABASE:-todo_db}
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost"
      APP_KEY: "base64:XG8Pq/8X996S9V8K9P9K9P9K9P9K9P9K9P9K9P9K9P8="
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-todo_db}
      DB_USERNAME: ${DB_USERNAME:-todo_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - todo_network
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ----------------------------------------------------------
  # MySQL 8 — Primary database
  # ----------------------------------------------------------
  # MySQL — Primary relational database storage
  mysql:
    image: mysql:8.0
    container_name: todo_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-todo_db}
      MYSQL_USER: ${DB_USERNAME:-todo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    # ----------------------------------------------------------
    # For security: Comment out ports if deploying to a VPS
    # to prevent external access to the database.
    # ----------------------------------------------------------
    # ports:
    #   - "3306:3306"
    networks:
      - todo_network
    # healthcheck: Periodically checks if the database is actually ready to accept connections
    healthcheck:
      # test: The command to run (mysqladmin ping) to verify the service is alive
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s    # How often to run the check
      timeout: 5s     # How long to wait for a response
      retries: 5      # Number of failures before marking as "unhealthy"
      start_period: 30s # Wait 30s before starting checks (gives DB time to boot)
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis 7 — Cache, sessions & queue broker
  # ----------------------------------------------------------
  # Redis — In-memory store for cache, sessions, and queues
  redis:
    image: redis:7-alpine
    container_name: todo_redis
    # Start Redis with password protection and memory management policies
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-""}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data
    # ----------------------------------------------------------
    # For security: Comment out ports if deploying to a VPS
    # to prevent external access to Redis.
    # ----------------------------------------------------------
    # ports:
    #   - "6379:6379"
    networks:
      - todo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # Horizon — Queue worker dashboard (Laravel Horizon)
  # ----------------------------------------------------------
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    container_name: todo_horizon
    # Start Laravel Horizon to monitor and process background queues
    command: php artisan horizon
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-todo_db}
      DB_USERNAME: ${DB_USERNAME:-todo_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      LOG_CHANNEL: stderr
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - todo_network
    restart: unless-stopped

# =============================================================
# Volumes
# =============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_cache:
    driver: local

# =============================================================
# Networks
# =============================================================
# networks: Virtual networks that allow containers to communicate with each other
networks:
  todo_network:
    # driver: bridge is the default for a single host; it creates an isolated internal network
    driver: bridge
