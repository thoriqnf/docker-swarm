# =============================================================
# docker-compose.swarm.yml — Phase 2: Basic Swarm
# =============================================================
# Usage:
#   docker stack deploy -c docker-compose.swarm.yml todo
# =============================================================

services:

  # ----------------------------------------------------------
  # Nginx — Web server
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    # Note: In a real multi-node swarm, we would bake the config 
    # into a custom image or use 'docker config create'.
    # For this demo, we'll assume a single-node or shared storage.
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/public:/var/www/html/public:ro
    networks:
      - todo_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]

  # ----------------------------------------------------------
  # PHP-FPM — Application
  # ----------------------------------------------------------
  app:
    image: ${DOCKER_HUB_USER:-yourusername}/${IMAGE_NAME:-todo-swarm-app}:latest
    environment:
      APP_NAME: "Todo Swarm"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost"
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-todo_db}
      DB_USERNAME: ${DB_USERNAME:-todo_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - todo_network
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  # ----------------------------------------------------------
  # MySQL 8 — Database
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-todo_db}
      MYSQL_USER: ${DB_USERNAME:-todo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - todo_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  # ----------------------------------------------------------
  # Redis 7 — Cache & Queue
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-""}
    volumes:
      - redis_data:/data
    networks:
      - todo_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ----------------------------------------------------------
  # Horizon — Queue Worker
  # ----------------------------------------------------------
  horizon:
    image: ${DOCKER_HUB_USER:-yourusername}/${IMAGE_NAME:-todo-swarm-app}:latest
    command: php artisan horizon
    environment:
      APP_ENV: production
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-todo_db}
      DB_USERNAME: ${DB_USERNAME:-todo_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      LOG_CHANNEL: stderr
    networks:
      - todo_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

# =============================================================
# Volumes
# =============================================================
volumes:
  mysql_data:
  redis_data:
  app_storage:

# =============================================================
# Networks
# =============================================================
networks:
  todo_network:
    driver: overlay
    attachable: true
