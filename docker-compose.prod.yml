# =============================================================
# docker-compose.prod.yml — Phase 5: Production Hardening
# =============================================================
# Focus: 
# 1. Resource Limits (CPU/RAM)
# 2. Advanced Deployment Logic (failure action, monitor, order)
# =============================================================

services:

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/public:/var/www/html/public:ro
    networks:
      - todo_network
    deploy:
      replicas: 2
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
      restart_policy:
        condition: on-failure

  app:
    image: ${DOCKER_HUB_USER:-thorthedev}/${IMAGE_NAME:-todo-swarm-app}:latest
    environment:
      APP_NAME: "Todo Swarm"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost"
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-todo_db}
      DB_USERNAME: ${DB_USERNAME:-todo_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - todo_network
    deploy:
      replicas: 4
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        monitor: 30s
        order: start-first
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
      restart_policy:
        condition: on-failure

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-todo_db}
      MYSQL_USER: ${DB_USERNAME:-todo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - todo_network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-""}
    volumes:
      - redis_data:/data
    networks:
      - todo_network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  horizon:
    image: ${DOCKER_HUB_USER:-thorthedev}/${IMAGE_NAME:-todo-swarm-app}:latest
    command: php artisan horizon
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-todo_db}
      DB_USERNAME: ${DB_USERNAME:-todo_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
    networks:
      - todo_network
    deploy:
      replicas: 1

volumes:
  mysql_data:
  redis_data:
  app_storage:

networks:
  todo_network:
    driver: overlay
    attachable: true
