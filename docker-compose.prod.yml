# =============================================================
# docker-compose.prod.yml — Phase 6: Secrets Management
# =============================================================
# Focus: Secure credential handling using Docker Secrets.
# =============================================================

services:

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/public:/var/www/html/public:ro
    networks:
      - todo_network
    deploy:
      replicas: 2
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          cpus: '0.50'
          memory: 128M

  app:
    image: ${DOCKER_HUB_USER:-thorthedev}/${IMAGE_NAME:-todo-swarm-app}:latest
    environment:
      APP_NAME: "Todo Swarm"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost"
      DB_HOST: mysql
      REDIS_HOST: redis
    secrets:
      - db_name
      - db_user
      - db_password
      - redis_password
      - app_key
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - todo_network
    deploy:
      replicas: 4
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        monitor: 30s
        order: start-first

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE_FILE: /run/secrets/db_name
      MYSQL_USER_FILE: /run/secrets/db_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    secrets:
      - db_name
      - db_user
      - db_password
      - db_root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - todo_network
    deploy:
      replicas: 1

  redis:
    image: redis:7-alpine
    command: >
      sh -c '
        redis-server --requirepass $$(cat /run/secrets/redis_password)
      '
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - todo_network
    deploy:
      replicas: 1

  horizon:
    image: ${DOCKER_HUB_USER:-thorthedev}/${IMAGE_NAME:-todo-swarm-app}:latest
    command: php artisan horizon
    environment:
      APP_ENV: production
      DB_HOST: mysql
      REDIS_HOST: redis
    secrets:
      - db_name
      - db_user
      - db_password
      - redis_password
      - app_key
    networks:
      - todo_network
    deploy:
      replicas: 1

secrets:
  db_name:
    external: true
  db_user:
    external: true
  db_password:
    external: true
  db_root_password:
    external: true
  redis_password:
    external: true
  app_key:
    external: true

volumes:
  mysql_data:
  redis_data:
  app_storage:

networks:
  todo_network:
    driver: overlay
    attachable: true
