name: Build & Deploy to Swarm

on:
  push:
    branches: [main]

env:
  IMAGE: thorthedev/swarm-demo

jobs:
  # ── Stage 1: Test ───────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Run simulated tests
        run: echo "✅ All tests passed!"

  # ── Stage 2: Build & Push ───────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag from commit SHA
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Copy stack file to server
        run: |
          scp -T docker-stack.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/stack-deploy.yml

      - name: Deploy stack to Swarm
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          ssh -T ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
            # Login to Docker Hub so nodes can pull the image
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Deploy with the new unique image tag
            IMAGE_TAG=${IMAGE_TAG} \
              docker stack deploy \
                --with-registry-auth \
                -c /tmp/stack-deploy.yml \
                todo_app

            # Cleanup temporary file
            rm /tmp/stack-deploy.yml
          EOF

      - name: Verify deployment convergence
        run: |
          ssh -T ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            TIMEOUT=120
            ELAPSED=0
            INTERVAL=10

            echo "Waiting for all replicas to be running..."

            while [ $ELAPSED -lt $TIMEOUT ]; do
              NOT_RUNNING=$(docker stack ps todo_app \
                --filter "desired-state=running" \
                --format "{{.CurrentState}}" \
                | grep -cv "Running" || true)

              if [ "$NOT_RUNNING" -eq "0" ]; then
                echo "✅ All replicas are running!"
                docker stack services todo_app
                exit 0
              fi

              echo "⏳ ${NOT_RUNNING} replicas not yet running... (${ELAPSED}s/${TIMEOUT}s)"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "❌ Timeout — deployment did not converge within ${TIMEOUT}s"
            docker stack ps todo_app
            exit 1
          EOF

      - name: Rollback if deployment failed
        if: failure()
        run: |
          echo "🔄 Deployment failed — triggering manual rollback..."
          ssh -T ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            for service in $(docker stack services todo_app --format "{{.Name}}"); do
              echo "Rolling back $service..."
              docker service rollback $service || true
            done
            sleep 20
            echo "📋 Status after rollback:"
            docker stack services todo_app
          EOF

      - name: Post deployment summary
        if: always()
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Deployment Summary

          | Field | Value |
          |---|---|
          | **Status** | ${{ job.status }} |
          | **Image Tag** | \`${IMAGE_TAG}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Triggered By** | ${{ github.actor }} |
          EOF
